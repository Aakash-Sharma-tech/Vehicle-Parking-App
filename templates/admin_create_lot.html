{% extends "base.html" %}

{% block title %}Create Parking Lot - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-plus"></i> Create New Parking Lot</h4>
            </div>
            <div class="card-body">
                <form method="POST" id="createLotForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">Lot Name *</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="price" class="form-label">Price per Hour ($) *</label>
                                <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Address *</label>
                        <textarea class="form-control" id="address" name="address" rows="2" required></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="pin_code" class="form-label">PIN Code *</label>
                                <input type="text" class="form-control" id="pin_code" name="pin_code" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="max_spots" class="form-label">Maximum Spots *</label>
                                <input type="number" class="form-control" id="max_spots" name="max_spots" min="1" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.parking_lots') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Lots
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Create Parking Lot
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('createLotForm').addEventListener('submit', function(e) {
    const price = parseFloat(document.getElementById('price').value);
    const maxSpots = parseInt(document.getElementById('max_spots').value);
    
    if (price <= 0) {
        e.preventDefault();
        alert('Price must be greater than 0');
        return false;
    }
    
    if (maxSpots <= 0) {
        e.preventDefault();
        alert('Maximum spots must be greater than 0');
        return false;
    }
});
</script>
{% endblock %}
